# DiscordPlus
# Used for update checks.
# Do not change unless you know what you are doing.
config-version: 17

# Main setup:
# 1. Create a Discord bot in the Discord Developer Portal.
# 2. Enable Message Content Intent and Server Members Intent.
# 3. Invite the bot with the bot and applications.commands scopes.
# 4. Give it Send Messages, Read Message History, View Channels, Use Application Commands, and Manage Roles.
# 5. Paste the bot token and channel IDs below.

bot:
  # Your Discord bot token. Keep this private.
  # The plugin will not connect to Discord until this is set.
  token: ""

  # Your Discord server ID.
  # Recommended even if the bot is only in one server.
  guild-id: ""

  # Delay Discord login after the plugin enables.
  # This keeps Minecraft startup responsive while JDA loads and connects.
  # Set to 0 if you want the bot to connect immediately.
  connect-delay-seconds: 5

  activity:
    # Show a Discord activity on the bot profile.
    enabled: true

    # Activity type.
    # Options: playing, watching, listening, competing, streaming, custom
    # Example: type: "playing" with text: "Minecraft" shows "Playing Minecraft".
    type: "playing"

    # Activity text.
    text: "Minecraft"

    # Only used when type is "streaming".
    # Must be a valid Twitch or YouTube URL.
    url: ""

    # Discord bots cannot set a custom activity logo/image here.
    # Custom logos are Discord Rich Presence/app assets, not normal bot activity.

server:
  # Name used in Discord embeds and placeholders.
  name: "Minecraft"

  # Optional. Shown by /discord invite.
  invite-url: ""

channels:
  # Discord text channel ID for chat relay and Discord chat commands.
  chat-channel-id: ""

  # Optional Discord text channel ID for event embeds.
  # Join, leave, first join, death, advancement, and lifecycle messages use this when set.
  # Falls back to chat-channel-id.
  events-channel-id: ""

  # Optional Discord text channel ID for staff/admin lifecycle messages.
  # Used when lifecycle.use-staff-channel is true.
  # Falls back to events-channel-id, then chat-channel-id.
  staff-channel-id: ""

features:
  # Send Minecraft chat to Discord.
  minecraft-to-discord-chat: true

  # Send Discord chat to Minecraft.
  discord-to-minecraft-chat: true

  # Send join/leave messages to Discord.
  join-leave-messages: true

  # Send first-time player join messages to Discord.
  first-join-messages: true

  # Send Minecraft advancement messages to Discord.
  advancement-messages: true

  # Send Minecraft death messages to Discord.
  death-messages: true

  # Send server startup, shutdown, and reload messages to Discord.
  lifecycle-messages: true

  # Enable Discord commands like !online and !players.
  # Slash commands are controlled by slash-commands.enabled.
  discord-commands: true

slash-commands:
  # Register /discord, /points, /playtime, /auction, and /orders commands with Discord.
  enabled: true

  # Overwrite the command list on startup so removed/renamed commands disappear from Discord autocomplete.
  refresh-on-start: true

join-leave:
  # Do not send join/leave messages from these worlds.
  ignored-worlds: []

first-join:
  # If false, a first-time player gets only the first-join message, not a normal join message too.
  also-send-join-message: false

  # Do not send first-join messages from these worlds.
  ignored-worlds: []

advancements:
  # If true, only relay advancements Minecraft would announce in chat.
  # This prevents most background/internal advancements from appearing in Discord.
  announce-chat-only: true

  # If false, hidden advancements are not relayed.
  include-hidden: false

  # Do not send advancement messages from these worlds.
  ignored-worlds: []

  # Ignore advancements whose full key starts with any of these values.
  # Recipes are stored as advancements internally, so this avoids Discord spam.
  ignored-key-prefixes:
    - "minecraft:recipes/"

  # Ignore exact advancement keys.
  # Example: "minecraft:story/root"
  ignored-keys: []

  # Labels available as {advancement_type_label}.
  type-labels:
    task: "Advancement Made"
    goal: "Goal Reached"
    challenge: "Challenge Complete"

  # Colors available as {advancement_color}.
  type-colors:
    task: "#8ecbff"
    goal: "#2b98fd"
    challenge: "#b642ff"

death-messages:
  # If true, only player-vs-player deaths are relayed.
  pvp-only: false

  # Do not send death messages from these worlds.
  ignored-worlds: []

  # Do not send death messages for these Bukkit damage causes.
  # Examples: fall, void, fire, lava, entity_attack
  ignored-causes: []

lifecycle:
  # Send a message when the Discord bot becomes ready after server startup.
  send-startup: true

  # Try to send a message when the plugin/server shuts down.
  send-shutdown: true

  # Send a message after /discord reload reconnects the bot.
  send-reload: true

  # If true, lifecycle messages use channels.staff-channel-id when set.
  use-staff-channel: false

linking:
  # Allow players to link their Minecraft account to Discord.
  enabled: true

  # Prefix for Discord commands.
  # Examples: !link 123456, !unlink, !online
  command-prefix: "!"

  # How long /discord link codes stay valid.
  code-expiry-minutes: 10

  # Optional Discord role given to linked users.
  # Leave empty to disable.
  linked-role-id: ""

role-sync:
  # Sync Minecraft permissions/groups to Discord roles.
  # Works well with LuckPerms group permissions like group.vip.
  enabled: true

  # How often online linked players are checked.
  interval-minutes: 5

  # Delay after join before syncing roles.
  # Useful because permission plugins may load player data shortly after join.
  join-sync-delay-seconds: 3

  # If true, DiscordPlus removes mapped Discord roles when the player no longer has the permission.
  # Safer default is false, so it only adds matching roles.
  remove-unmatched-mapped-roles: false

  # Map Minecraft permissions to Discord role IDs.
  # The bot role must be above every role it manages.
  mappings:
    vip:
      permission: "group.vip"
      role-id: ""
    staff:
      permission: "group.staff"
      role-id: ""

integrations:
  # Optional companion plugin forwarding. The source plugins stay independent; DiscordPlus listens for their Bukkit events.
  enabled: true

  auctionsplus:
    enabled: true
    events:
      listing-created: true
      listing-sold: true
      bid-placed: true
      auction-won: true
      listing-cancelled: false
      listing-expired: false
      # Enables !ah bid, !auc bid, and /auction bid Discord commands.
      commands: true
    commands:
      # If false, auction commands only work inside your Discord server.
      # This is disabled by default because bids move money.
      allow-direct-messages: false

      # Optional channel allow-list for auction commands. Empty means any visible server channel.
      allowed-channel-ids: []

      # If true, linked players must be online to bid from Discord.
      # If false, offline bids are allowed only when Auctions+ can verify auctionsplus.bid through Vault permissions.
      require-player-online: false

      # Per-Discord-user cooldown for auction bid commands. Set to 0 to disable.
      cooldown-seconds: 3

      # Maximum bid allowed from Discord. Set to 0 for no Discord-specific limit.
      max-bid: 0.0

      # Maximum rows shown by !ah list and /auction list.
      list-limit: 10

  ordersplus:
    enabled: true
    events:
      order-created: true
      order-fulfilled: true
      order-cancelled: false
      order-expired: false
      # Enables !orders, !order, and /orders Discord commands.
      commands: true
    commands:
      # If false, order commands only work inside your Discord server.
      allow-direct-messages: false

      # Optional channel allow-list for order commands. Empty means any visible server channel.
      allowed-channel-ids: []

      # Maximum rows shown by !orders list and /orders list.
      list-limit: 10

  playtimeplus:
    enabled: true
    events:
      afk: false
      reward: true
      # Enables !playtime, !pt, and /playtime Discord commands.
      commands: true
    commands:
      # If false, playtime commands only work inside your Discord server.
      allow-direct-messages: true

      # Optional channel allow-list for playtime commands. Empty means any visible server channel.
      allowed-channel-ids: []

      # Maximum rows shown by !playtime top and /playtime top.
      top-limit: 10

  advancementplus:
    # Disabled by default to avoid duplicating DiscordPlus' native advancement relay.
    enabled: false
    events:
      progress: false
      completion: true

  skinsplus:
    enabled: false
    events:
      change: true

  parcel:
    enabled: true
    events:
      queued: true
      delivered: true
      failed: true

  chatplus:
    enabled: true
    # If ChatPlus is installed, relay [item], [inventory], and [ender] style
    # placeholders to Discord using ChatPlus' Discord-safe rendering API.
    interactive-placeholders: true
    events:
      broadcast: true

  pointsplus:
    enabled: true
    events:
      # Enables !points, !balance, and !pay Discord commands.
      commands: true
    commands:
      # If false, points commands only work inside your Discord server.
      allow-direct-messages: true

      # Optional channel allow-list for points commands. Empty means any visible server channel.
      allowed-channel-ids: []

      # If true, payment targets must also be linked through DiscordPlus.
      require-linked-targets: true

      # Maximum points that can be sent in one Discord command. Set to 0 for no Discord-specific limit.
      max-payment: 1000000

      # Maximum rows shown by !points top.
      top-limit: 10

discord-style:
  minecraft-chat:
    # If false, Minecraft chat is sent by the bot account.
    # If true, Minecraft chat is sent through a Discord webhook with player-style names.
    use-webhook: false

    # Optional webhook URL for nicer Minecraft -> Discord chat.
    # Create in Discord: Channel Settings > Integrations > Webhooks.
    # Keep this private.
    webhook-url: ""

    # Webhook sender name.
    username: "{player}"

    # Optional webhook avatar URL.
    # Example with a head avatar service:
    # "https://mc-heads.net/avatar/{player}/64"
    avatar-url: ""

    # Minecraft chat format shown in Discord.
    content: "**{player}**: {message}"

  join:
    # Use "embed" for a styled Discord box, or "text" for a normal message.
    style: "embed"
    text: "**{player}** joined **{server}** - {online}/{max_players} online"
    embed:
      # Optional author row shown above the title.
      author-name: "Player Activity"
      author-url: ""
      author-icon-url: "{player_avatar_url}"
      title: "{player} joined"
      description: "**{server}** now has **{online}/{max_players}** players online."
      color: "#2b98fd"
      footer: "{world} | {x}, {y}, {z}"
      thumbnail-url: ""
      image-url: ""
      fields: []
      timestamp: true

  quit:
    style: "embed"
    text: "**{player}** left **{server}** - {online}/{max_players} online"
    embed:
      author-name: "Player Activity"
      author-url: ""
      author-icon-url: "{player_avatar_url}"
      title: "{player} left"
      description: "**{server}** now has **{online}/{max_players}** players online."
      color: "#8ecbff"
      footer: "{world} | {x}, {y}, {z}"
      thumbnail-url: ""
      image-url: ""
      fields: []
      timestamp: true

  first-join:
    style: "embed"
    text: "**{player}** joined **{server}** for the first time"
    embed:
      author-name: "New Player"
      author-url: ""
      author-icon-url: "{player_avatar_url}"
      title: "{player} joined for the first time"
      description: "Welcome to **{server}**. There are now **{online}/{max_players}** players online."
      color: "#57F287"
      footer: "{uuid}"
      thumbnail-url: ""
      image-url: ""
      fields:
        - name: "World"
          value: "{world}"
          inline: true
        - name: "Location"
          value: "{x}, {y}, {z}"
          inline: true
      timestamp: true

  advancement:
    style: "embed"
    text: "**{player}** completed **{advancement_title}**"
    embed:
      author-name: "{advancement_type_label} | {player}"
      author-url: ""
      author-icon-url: "{player_avatar_url}"
      title: "{advancement_title}"
      description: "{advancement_description}"
      color: "{advancement_color}"
      footer: "{server} | {advancement_key}"
      thumbnail-url: ""
      image-url: ""
      fields:
        - name: "Player"
          value: "{player}"
          inline: true
        - name: "Type"
          value: "{advancement_type}"
          inline: true
      timestamp: true

  death:
    style: "embed"
    text: "{death_message}"
    embed:
      author-name: "Player Death"
      author-url: ""
      author-icon-url: "{player_avatar_url}"
      title: "{player} died"
      description: "{death_message}"
      color: "#ED4245"
      footer: "{world} | {x}, {y}, {z}"
      thumbnail-url: ""
      image-url: ""
      fields:
        - name: "Cause"
          value: "{death_cause}"
          inline: true
        - name: "Killer"
          value: "{killer}"
          inline: true
      timestamp: true

  server-start:
    style: "embed"
    text: "**{server}** is online."
    embed:
      author-name: "Server Lifecycle"
      author-url: ""
      author-icon-url: ""
      title: "{server} online"
      description: "{lifecycle_description}"
      color: "{lifecycle_color}"
      footer: "Discord+"
      thumbnail-url: ""
      image-url: ""
      fields:
        - name: "Players"
          value: "{online}/{max_players}"
          inline: true
      timestamp: true

  server-stop:
    style: "embed"
    text: "**{server}** is offline."
    embed:
      author-name: "Server Lifecycle"
      author-url: ""
      author-icon-url: ""
      title: "{server} offline"
      description: "{lifecycle_description}"
      color: "{lifecycle_color}"
      footer: "Discord+"
      thumbnail-url: ""
      image-url: ""
      fields: []
      timestamp: true

  reload:
    style: "embed"
    text: "**DiscordPlus reloaded on {server}.**"
    embed:
      author-name: "Server Lifecycle"
      author-url: ""
      author-icon-url: ""
      title: "DiscordPlus reloaded"
      description: "{lifecycle_description}"
      color: "{lifecycle_color}"
      footer: "{server}"
      thumbnail-url: ""
      image-url: ""
      fields:
        - name: "Players"
          value: "{online}/{max_players}"
          inline: true
      timestamp: true

  broadcasts:
    purchase:
      style: "embed"
      text: "**{broadcast_player}** purchased **{broadcast_message}**."
      embed:
        author-name: "Purchase"
        author-url: ""
        author-icon-url: "{broadcast_player_avatar_url}"
        title: "New Purchase"
        description: "**{broadcast_player}** purchased **{broadcast_message}**."
        color: "#f5c542"
        footer: "{server}"
        thumbnail-url: ""
        image-url: ""
        fields:
          - name: "Player"
            value: "{broadcast_player}"
            inline: true
          - name: "Item"
            value: "{broadcast_message}"
            inline: true
        timestamp: true

    announcement:
      style: "embed"
      text: "**{broadcast_message}**"
      embed:
        author-name: "Broadcast"
        author-url: ""
        author-icon-url: ""
        title: "{broadcast_label}"
        description: "{broadcast_message}"
        color: "#2b98fd"
        footer: "{server}"
        thumbnail-url: ""
        image-url: ""
        fields: []
        timestamp: true

    auction-listing:
      style: "embed"
      text: "**{broadcast_message}**"
      embed:
        author-name: "Auctions+"
        author-url: ""
        author-icon-url: "{broadcast_player_avatar_url}"
        title: "New Auction"
        description: "{broadcast_message}"
        color: "#2b98fd"
        footer: "{server}"
        thumbnail-url: ""
        image-url: ""
        fields: []
        timestamp: true

    auction-sale:
      style: "embed"
      text: "**{broadcast_message}**"
      embed:
        author-name: "Auctions+"
        author-url: ""
        author-icon-url: "{broadcast_player_avatar_url}"
        title: "Auction Sale"
        description: "{broadcast_message}"
        color: "#f5c542"
        footer: "{server}"
        thumbnail-url: ""
        image-url: ""
        fields: []
        timestamp: true

    auction-bid:
      style: "embed"
      text: "**{broadcast_message}**"
      embed:
        author-name: "Auctions+"
        author-url: ""
        author-icon-url: "{broadcast_player_avatar_url}"
        title: "New Bid"
        description: "{broadcast_message}"
        color: "#8ecbff"
        footer: "{server}"
        thumbnail-url: ""
        image-url: ""
        fields: []
        timestamp: true

    auction-won:
      style: "embed"
      text: "**{broadcast_message}**"
      embed:
        author-name: "Auctions+"
        author-url: ""
        author-icon-url: "{broadcast_player_avatar_url}"
        title: "Auction Won"
        description: "{broadcast_message}"
        color: "#57F287"
        footer: "{server}"
        thumbnail-url: ""
        image-url: ""
        fields: []
        timestamp: true

    order-created:
      style: "embed"
      text: "**{broadcast_message}**"
      embed:
        author-name: "Orders+"
        author-url: ""
        author-icon-url: "{broadcast_player_avatar_url}"
        title: "New Order"
        description: "{broadcast_message}"
        color: "#2b98fd"
        footer: "{server}"
        thumbnail-url: ""
        image-url: ""
        fields: []
        timestamp: true

    order-fulfilled:
      style: "embed"
      text: "**{broadcast_message}**"
      embed:
        author-name: "Orders+"
        author-url: ""
        author-icon-url: "{broadcast_player_avatar_url}"
        title: "Order Fulfilled"
        description: "{broadcast_message}"
        color: "#57F287"
        footer: "{server}"
        thumbnail-url: ""
        image-url: ""
        fields: []
        timestamp: true

    order-cancel:
      style: "embed"
      text: "**{broadcast_message}**"
      embed:
        author-name: "Orders+"
        author-url: ""
        author-icon-url: "{broadcast_player_avatar_url}"
        title: "Order Cancelled"
        description: "{broadcast_message}"
        color: "#ED4245"
        footer: "{server}"
        thumbnail-url: ""
        image-url: ""
        fields: []
        timestamp: true

    order-expire:
      style: "embed"
      text: "**{broadcast_message}**"
      embed:
        author-name: "Orders+"
        author-url: ""
        author-icon-url: "{broadcast_player_avatar_url}"
        title: "Order Expired"
        description: "{broadcast_message}"
        color: "#8ecbff"
        footer: "{server}"
        thumbnail-url: ""
