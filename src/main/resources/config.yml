  status:
    # Used by !online.
    style: "embed"
    text: "**{server}**: {online}/{max_players} online"
    embed:
      author-name: "Server Status"
      author-url: ""
      author-icon-url: ""
      title: "{server}"
      description: "**{online}/{max_players}** players online."
      color: "#2b98fd"
      footer: "Discord+"
      thumbnail-url: ""
      image-url: ""
      fields:
        - name: "Players"
          value: "{players}"
          inline: false
      timestamp: true

minecraft-style:
  # Discord chat format shown in Minecraft.
  # Minecraft color codes with & are supported.
  discord-chat: "&#2b98fdDiscord &8› &f{user}&8: &7{message}"

messages:
  # Prefix for in-game DiscordPlus messages.
  prefix: "&#2b98fdDiscordPlus &8› &7"

# Placeholders:
# {server}       Server name from this config
# {player}       Player username
# {display_name} Player display name without colors
# {uuid}         Player UUID
# {player_avatar_url} Player head image URL for Discord embed icons
# {message}      Chat message
# {online}       Online player count
# {max_players}  Server max players
# {players}      Online player list
# {world}        Player world
# {x} {y} {z}    Player block coordinates
# {event_type}   Generic event type
# {event_label}  Generic event label
# {event_color}  Generic event color
# {advancement_key}         Full advancement key, like minecraft:story/mine_stone
# {advancement_namespace}   Advancement namespace, like minecraft
# {advancement_path}        Advancement path, like story/mine_stone
# {advancement_title}       Advancement display title
# {advancement_description} Advancement display description
# {advancement_type}        task, goal, or challenge
# {advancement_type_label}  Configured label for the advancement type
# {advancement_color}       Configured color for the advancement type
# {advancement_hidden}      true if the advancement is hidden
# {advancement_announces}   true if Minecraft announces it in chat
# {death_message}       Minecraft death message
# {death_cause}         Bukkit damage cause, like fall, lava, entity_attack
# {killer}              Killer username, or None
# {killer_uuid}         Killer UUID, if there is one
# {killer_display_name} Killer display name, if there is one
# {killer_avatar_url}   Killer head image URL, if there is one
# {is_pvp_death}        true when the death was caused by a player
# {lifecycle_type}        startup, shutdown, or reload
# {lifecycle_label}       Configured lifecycle label
# {lifecycle_description} Lifecycle message description
# {lifecycle_color}       Lifecycle embed color
# {broadcast_type}        Broadcast style key, like purchase
# {broadcast_label}       Broadcast style label, like Purchase
# {broadcast_message}     Broadcast message text
# {broadcast_player}      Broadcast player name, or empty
# {broadcast_player_avatar_url} Broadcast player head image URL, or empty
