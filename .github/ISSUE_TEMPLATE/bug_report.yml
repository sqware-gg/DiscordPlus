name: Bug report
description: Report a reproducible plugin issue.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not paste live tokens, webhook URLs, private IPs, or full private configs.
  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: server-version
    attributes:
      label: Server software and version
      placeholder: "Paper 1.21.5"
    validations:
      required: true
  - type: input
    id: java-version
    attributes:
      label: Java version
      placeholder: "Java 17 / Java 21"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Explain the issue and what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: "1. Install plugin...\n2. Run command...\n3. Observe..."
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: text
